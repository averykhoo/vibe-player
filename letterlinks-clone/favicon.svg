<!-- File: favicon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background Square (optional, good for visibility) -->
  <rect width="100" height="100" rx="15" ry="15" fill="#0D6EFD"/> <!-- Using primary blue from theme -->

  <!-- First 'L' -->
  <path d="M 30 25 L 30 75 L 55 75"
        stroke="#FFFFFF"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none" />

  <!-- Second 'L' - slightly offset -->
   <path d="M 45 25 L 45 75 L 70 75"
        stroke="#FFFFFF"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.8" />

    <!-- Or alternative simpler overlap -->
    <!--
     <path d="M 30 25 L 30 75 L 70 75"
           stroke="#FFFFFF"
           stroke-width="12"
           stroke-linecap="round"
           stroke-linejoin="round"
           fill="none" />
     <line x1="50" y1="25" x2="50" y2="75"
           stroke="#FFFFFF"
           stroke-width="12"
           stroke-linecap="round" />
     -->
</svg>
